<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-top">
            <div class="search">
                <button type="button" class="search-button">
                    <img class="search-image" src="./assets/magnify.svg" alt="">
                </button>

                <input type="text" class="search-input">
            </div>

            <div class="account">
                <img class="account-ring" src="./assets/bell-ring-outline.svg" alt="">


                <img class="account-profile" src="./assets/face-man-profile.svg" alt="">


                <h2 class="account-name">John Doe</h2>
            </div>
        </div>

        <div class="header-bottom">
            <div class="user">

                <img class="user-profile" src="./assets/face-man-profile.svg" alt="">

                <div class="user-name">
                    <p>Hi there,</p>
                    <h2>John Doe<span>(@jdoe)</span></h2>
                </div>

            </div>

            <div class="user-action">
                <button class="user-btn">New</button>
                <button class="user-btn">Upload</button>
                <button class="user-btn">Share</button>
            </div>
        </div>



    </header>

    <aside>
        <div class="sidebar-topic">
            <img class="sidebar-logo" src="./assets/view-dashboard.svg" alt="">
            <h3 class="sidebar-title">Dashboard</h3>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li>
                    <img src="./assets/sidebar/home-variant-outline.svg" alt="" class="nav-icon">
                    <p class="nav-title">Home</p>
                </li>
                <li>
                    <img src="./assets/sidebar/account-details-outline.svg" alt="" class="nav-icon">
                    <p class="nav-title">Profile</p>
                </li>
                <li>
                    <img src="./assets/sidebar/message-badge-outline.svg" alt="" class="nav-icon">
                    <p class="nav-title">Messages</p>
                </li>
                <li>
                    <img src="./assets/sidebar/history.svg" alt="" class="nav-icon">
                    <p class="nav-title">History</p>
                </li>
                <li>
                    <img src="./assets/sidebar/file-outline.svg" alt="" class="nav-icon">
                    <p class="nav-title">Tasks</p>
                </li>
                <li>
                    <img src="./assets/sidebar/account-group.svg" alt="" class="nav-icon">
                    <p class="nav-title">Communities</p>
                </li>
            </ul>
        </nav>

        <nav class="sidebar-setting">
            <ul>
                <li>
                    <img src="./assets/sidebar/cog.svg" alt="">
                    <p>Setting</p>
                </li>
                <li>
                    <img src="./assets/sidebar/help.svg" alt="">
                    <p>Support</p>
                </li>
                <li>
                    <img src="./assets/sidebar/shield-check-outline.svg" alt="">
                    <p>Privacy</p>
                </li>
            </ul>
        </nav>
    </aside>

</body>

</html>
