<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-top">
            <div class="search">
                <button type="button" class="search-button">
                    <img class="search-image" src="./assets/magnify.svg" alt="">
                </button>

                <input type="text" class="search-input">
            </div>

            <div class="account">
                <img class="account-ring" src="./assets/bell-ring-outline.svg" alt="">


                <img class="account-profile" src="./assets/face-man-profile.svg" alt="">


                <h2 class="account-name">John Doe</h2>
            </div>
        </div>

        <div class="header-bottom">
            <div class="user">

                <img class="user-profile" src="./assets/face-man-profile.svg" alt="">

                <div class="user-name">
                    <p>Hi there,</p>
                    <h2>John Doe<span>(@jdoe)</span></h2>
                </div>

            </div>

            <div class="user-action">
                <button class="user-btn">New</button>
                <button class="user-btn">Upload</button>
                <button class="user-btn">Share</button>
            </div>
        </div>



    </header>

</body>

</html>
